name: Website Deploy

on:
  push:
    branches:
      - main
  schedule:
    # Beijing time 08:00-22:30: rolling coverage for the current Sporttery sales day.
    - cron: "*/30 0-14 * * *"
    # Beijing time 19:50: hard final-lock checkpoint.
    - cron: "50 11 * * *"
    # Beijing time 21:40: final odds snapshot before sale close.
    - cron: "40 13 * * *"
    # Beijing time 22:05: sale-close freeze and post-match review pass.
    - cron: "5 14 * * *"
  workflow_dispatch:
    inputs:
      update_data:
        description: "Run cloud Sporttery data update"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

concurrency:
  group: website-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Deploy website or update Sporttery data
        shell: bash
        run: |
          if [ "$RUN_DATA_UPDATE" = "true" ]; then
            cat > /tmp/sporttery-cache-sync.mjs <<'NODE'
const cacheBase = "http://114.55.11.209:8787";
const apiBase = "https://worldcup-dashboard-4hr.pages.dev";

async function getJson(url) {
  const response = await fetch(url);
  const text = await response.text();
  if (!response.ok) throw new Error(`${url} ${response.status}: ${text.slice(0, 160)}`);
  return JSON.parse(text);
}

const calculatorRaw = await getJson(`${cacheBase}/sporttery/calculator.json`);
const resultPages = [];
for (let pageNo = 1; pageNo <= 5; pageNo += 1) {
  resultPages.push(await getJson(`${cacheBase}/sporttery/results-page-${pageNo}.json`));
}

const response = await fetch(`${apiBase}/api/sync/sporttery-cache`, {
  method: "POST",
  headers: {
    "content-type": "application/json",
    "x-apifootball-api-key": process.env.APIFOOTBALL_API_KEY || "",
    "x-football-data-api-key": process.env.FOOTBALL_DATA_API_KEY || "",
    "x-thesportsdb-api-key": process.env.THESPORTSDB_API_KEY || "",
  },
  body: JSON.stringify({ calculatorRaw, resultPages }),
});
const text = await response.text();
console.log(text);
if (!response.ok) process.exit(1);
NODE
            if ! node /tmp/sporttery-cache-sync.mjs; then
              echo "Sporttery sync failed; running live-result fallback only."
              curl --fail-with-body -sS -X POST \
                -H "x-apifootball-api-key: $APIFOOTBALL_API_KEY" \
                -H "x-football-data-api-key: $FOOTBALL_DATA_API_KEY" \
                -H "x-thesportsdb-api-key: $THESPORTSDB_API_KEY" \
                "https://worldcup-dashboard-4hr.pages.dev/api/sync/live-results"
            fi
          else
            npm run cloudflare:deploy
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          SPORTTERY_UPSTREAM_PROXY: ${{ secrets.SPORTTERY_UPSTREAM_PROXY }}
          APIFOOTBALL_API_KEY: ${{ secrets.APIFOOTBALL_API_KEY }}
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
          THESPORTSDB_API_KEY: ${{ secrets.THESPORTSDB_API_KEY }}
          RUN_DATA_UPDATE: ${{ github.event_name == 'schedule' || inputs.update_data == 'true' }}
