name: Website Deploy

on:
  push:
    branches:
      - main
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:
    inputs:
      update_data:
        description: "Run cloud Sporttery data update"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

concurrency:
  group: website-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Deploy website or update Sporttery data
        shell: bash
        run: |
          if [ "$RUN_DATA_UPDATE" = "true" ]; then
            if [ -z "$SPORTTERY_UPSTREAM_PROXY" ]; then
              echo "::notice::SPORTTERY_UPSTREAM_PROXY is not configured; skipped cloud data update."
              exit 0
            fi
            npm run sporttery:auto-deploy
          else
            npm run cloudflare:deploy
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          SPORTTERY_UPSTREAM_PROXY: ${{ secrets.SPORTTERY_UPSTREAM_PROXY }}
          RUN_DATA_UPDATE: ${{ github.event_name == 'schedule' || inputs.update_data == 'true' }}
