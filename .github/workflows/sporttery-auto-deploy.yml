name: Website Deploy

on:
  push:
    branches:
      - main
  schedule:
    # Beijing time 08:00-22:30: rolling coverage for the current Sporttery sales day.
    - cron: "*/30 0-14 * * *"
    # Beijing time 19:50: hard final-lock checkpoint.
    - cron: "50 11 * * *"
    # Beijing time 21:40: final odds snapshot before sale close.
    - cron: "40 13 * * *"
    # Beijing time 22:05: sale-close freeze and post-match review pass.
    - cron: "5 14 * * *"
  workflow_dispatch:
    inputs:
      update_data:
        description: "Run cloud Sporttery data update"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

concurrency:
  group: website-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Deploy website or update Sporttery data
        shell: bash
        run: |
          if [ "$RUN_DATA_UPDATE" = "true" ]; then
            if ! curl --fail-with-body -sS -X POST \
              -H "x-sporttery-upstream-proxy: $SPORTTERY_UPSTREAM_PROXY" \
              -H "x-apifootball-api-key: $APIFOOTBALL_API_KEY" \
              -H "x-football-data-api-key: $FOOTBALL_DATA_API_KEY" \
              -H "x-thesportsdb-api-key: $THESPORTSDB_API_KEY" \
              "https://worldcup-dashboard-4hr.pages.dev/api/sync/sporttery"; then
              echo "Sporttery sync failed; running live-result fallback only."
              curl --fail-with-body -sS -X POST \
                -H "x-apifootball-api-key: $APIFOOTBALL_API_KEY" \
                -H "x-football-data-api-key: $FOOTBALL_DATA_API_KEY" \
                -H "x-thesportsdb-api-key: $THESPORTSDB_API_KEY" \
                "https://worldcup-dashboard-4hr.pages.dev/api/sync/live-results"
            fi
          else
            npm run cloudflare:deploy
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          SPORTTERY_UPSTREAM_PROXY: ${{ secrets.SPORTTERY_UPSTREAM_PROXY }}
          APIFOOTBALL_API_KEY: ${{ secrets.APIFOOTBALL_API_KEY }}
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
          THESPORTSDB_API_KEY: ${{ secrets.THESPORTSDB_API_KEY }}
          RUN_DATA_UPDATE: ${{ github.event_name == 'schedule' || inputs.update_data == 'true' }}
